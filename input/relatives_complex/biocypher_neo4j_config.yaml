biocypher:
    debug: false
    offline: true
    dbms: neo4j

    # Ontology configuration
    head_ontology:
        url: input/relatives_complex/ontology.ttl
        root_node: Biocypherroot

neo4j:
    delimiter: '\t'
    array_delimiter: "|"
    skip_duplicate_nodes: true
    skip_bad_relationships: true
    import_call_bin_prefix: ''  # path to "neo4j-admin"
